<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Nhân Sự Giảng Dạy</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 10px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Thanh điều hướng Tab cực đẹp */
        .tab-navigation {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        .tab-btn {
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            color: #7f8c8d;
            background: #eee;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        /* Style khi nút Tab được kích hoạt (Active) */
        .tab-btn.active[data-tab="giao-vien"] {
            background-color: #3498db;
            color: white;
        }
        .tab-btn.active[data-tab="tro-giang"] {
            background-color: #e67e22;
            color: white;
        }
        .tab-btn:hover {
            opacity: 0.9;
        }

        /* Ẩn nội dung bảng khi chưa chọn */
        .tab-content {
            display: none;
        }
        /* Hiển thị bảng khi được thêm class .active */
        .tab-content.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            vertical-align: middle;
        }
        th {
            background-color: #3498db;
            color: white;
            font-weight: 600;
        }
        .table-trogiang th {
            background-color: #e67e22;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .btn-call {
            display: inline-block;
            background-color: #2ab7ca;
            color: white;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            transition: background 0.3s ease;
        }
        .btn-call:hover {
            background-color: #1b94a3;
        }
        .badge-lop {
            background-color: #2ecc71;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .table-trogiang .badge-lop {
            background-color: #9b59b6;
        }

        @media screen and (max-width: 600px) {
            .tab-navigation {
                flex-direction: row;
            }
            .tab-btn {
                flex: 1;
                text-align: center;
                padding: 12px 5px;
                font-size: 0.9em;
            }
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }
            tr {
                border: 1px solid #ccc;
                margin-bottom: 10px;
                border-radius: 4px;
                padding: 10px;
            }
            td {
                border: none;
                border-bottom: 1px solid #eee;
                position: relative;
                padding-left: 50%;
                text-align: right;
            }
            td:before {
                position: absolute;
                left: 10px;
                width: 45%;
                padding-right: 10px;
                white-space: nowrap;
                text-align: left;
                font-weight: bold;
            }
            td:nth-of-type(1):before { content: "Họ và Tên"; }
            td:nth-of-type(2):before { content: "Liên hệ"; }
            td:nth-of-type(3):before { content: "Tên Lớp"; }
            td:nth-of-type(4):before { content: "Thời Gian Đăng Ký"; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Danh Sách Quản Lý Nhân Sự</h2>
    
    <div class="tab-navigation">
        <button class="tab-btn active" data-tab="giao-vien">👨‍🏫 DANH SÁCH GIÁO VIÊN</button>
        <button class="tab-btn" data-tab="tro-giang">🧑‍🎓 DANH SÁCH TRỢ GIẢNG</button>
    </div>

    <div id="giao-vien" class="tab-content active">
        <table>
            <thead>
                <tr>
                    <th>Họ và Tên</th>
                    <th>Liên hệ</th>
                    <th>Tên Lớp</th>
                    <th>Thời Gian Giảng Dạy</th>
                </tr>
            </thead>
            <tbody id="giao-vien-body">
                </tbody>
        </table>
    </div>

    <div id="tro-giang" class="tab-content">
        <table class="table-trogiang">
            <thead>
                <tr>
                    <th>Họ và Tên</th>
                    <th>Liên hệ</th>
                    <th>Tên Lớp Hỗ Trợ</th>
                    <th>Thời Gian Trực</th>
                </tr>
            </thead>
            <tbody id="tro-giang-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 1. MẢNG DỮ LIỆU GIÁO VIÊN
    const danhSachGiaoVien = [
        {
            hoTen: "Nguyễn Văn A",
            sdt: "0901234567",
            lop: "Lớp 10A1",
            thoiGian: "Thứ 2, Thứ 4 (08:00 - 10:00)"
        },
        {
            hoTen: "Trần Thị B",
            sdt: "0912345678",
            lop: "Lớp 11B2",
            thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)"
        },
        {
            hoTen: "Lê Hoàng C",
            sdt: "0983456789",
            lop: "Lớp 12C3",
            thoiGian: "Thứ 7 (09:00 - 11:30)"
        }
    ];

    // 2. MẢNG DỮ LIỆU TRỢ GIẢNG
    const danhSachTroGiang = [
        {
            hoTen: "Phạm Minh D",
            sdt: "0977888999",
            lop: "Lớp 10A1 & 11B2",
            thoiGian: "Thứ 2, 3, 4, 5 (Theo ca học)"
        },
        {
            hoTen: "Hoàng Thu Thảo",
            sdt: "0965123456",
            lop: "Lớp 12C3",
            thoiGian: "Thứ 7 (08:30 - 12:00)"
        },
        {
            hoTen: "Đặng Đình Khôi",
            sdt: "0934555666",
            lop: "Lớp Luyện Thi",
            thoiGian: "Chủ Nhật (17:30 - 20:30)"
        }
    ];

    // Định dạng SĐT tự động
    function formatPhone(phoneStr) {
        if (!phoneStr) return "";
        return phoneStr.replace(/(\d{4})(\d{3})(\d{3})/, "$1.$2.$3");
    }

    // Đổ dữ liệu vào bảng
    function renderTable(dataArray, targetBodyId) {
        const tbody = document.getElementById(targetBodyId);
        tbody.innerHTML = ""; 

        dataArray.forEach(item => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><strong>${item.hoTen}</strong></td>
                <td><a href="tel:${item.sdt}" class="btn-call">📞 Gọi: ${formatPhone(item.sdt)}</a></td>
                <td><span class="badge-lop">${item.lop}</span></td>
                <td>${item.thoiGian}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Logic xử lý bấm chuyển đổi Tab
    function setupTabSwitching() {
        const buttons = document.querySelectorAll('.tab-btn');
        const contents = document.querySelectorAll('.tab-content');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Xóa trạng thái active của tất cả các nút và nội dung bảng cũ
                buttons.forEach(b => b.classList.remove('active'));
                contents.forEach(c => c.classList.remove('active'));

                // Kích hoạt nút hiện tại và bảng tương ứng dựa trên thuộc tính data-tab
                btn.classList.add('active');
                const targetTabId = btn.getAttribute('data-tab');
                document.getElementById(targetTabId).classList.add('active');
            });
        });
    }

    // Khởi tạo chạy ban đầu
    window.onload = function() {
        renderTable(danhSachGiaoVien, "giao-vien-body");
        renderTable(danhSachTroGiang, "tro-giang-body");
        setupTabSwitching();
    };
</script>

</body>
</html>
