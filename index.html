<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Quản Lý Lịch Học & Điểm Danh</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f0f2f5; padding: 12px; color: #333;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        h2 { text-align: center; color: #2c3e50; margin: 15px 0 20px 0; font-size: 1.25em; width: 100%; max-width: 500px; line-height: 1.4; }
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 14px; width: 100%; max-width: 500px; margin: 0 auto; }
        
        .card-A { background: #ffffff; border-radius: 10px; box-shadow: 0 3px 6px rgba(0,0,0,0.05); border-top: 4px solid #3498db; width: 100%; overflow: hidden; margin-bottom: 2px; }
        .title-A { font-weight: bold; font-size: 1.05em; color: #2c3e50; display: flex; justify-content: space-between; align-items: center; padding: 14px; background: #fff; cursor: pointer; }
        
        /* Đổi màu viền riêng cho ô giáo viên để dễ phân biệt */
        .card-teacher { border-top: 4px solid #9b59b6; }
        .teacher-info-box { display: none; padding: 14px; background: #fff; border-top: 1px solid #edf2f7; }
        .teacher-table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        .teacher-table th { background: #f7fafc; color: #718096; text-align: left; padding: 8px; border-bottom: 2px solid #e2e8f0; font-size: 0.85em; text-transform: uppercase; }
        .teacher-table td { padding: 10px 8px; border-bottom: 1px solid #edf2f7; color: #4a5568; }
        .teacher-table td a { color: #2b6cb0; text-decoration: none; font-weight: bold; }

        .sub-grid-B { display: none; padding: 0 14px 14px 14px; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; border-top: 1px solid #edf2f7; }
        
        .card-B { background: #f8f9fa; padding: 12px 5px; border-radius: 6px; font-size: 0.9em; font-weight: 600; color: #495057; text-align: center; border: 1px solid #e9ecef; margin-top: 10px; cursor: pointer; }
        .card-B.has-class { background: #e3f2fd !important; color: #0d47a1 !important; border-color: #bbdefb !important; }
        .card-B.has-class::after { content: "• Có lớp"; display: block; font-size: 0.75em; color: #1565c0; font-weight: normal; }

        .floor-container-C { display: none; grid-column: span 2; background: #f7fafc; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 6px; width: 100%; }
        .floor-list { display: flex; flex-direction: column; gap: 6px; }
        .floor-item { border: 1px solid #e2e8f0; border-radius: 5px; background: #ffffff; overflow: hidden; }
        
        .floor-btn { background: #edf2f7; padding: 10px; font-size: 0.85em; font-weight: 600; display: flex; justify-content: space-between; width: 100%; cursor: pointer; border: none; text-align: left; }
        .floor-btn.has-class { background: #e8f5e9 !important; color: #1b5e20 !important; }
        
        .class-info { display: none; background: #ffffff; padding: 12px; font-size: 0.85em; border-top: 1px solid #edf2f7; color: #4a5568; }
        
        .shift-block { padding: 12px 0; border-bottom: 3px dashed #e2e8f0; position: relative; }
        .shift-block:last-child { border-bottom: none; }
        
        .info-row-ca { margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .info-row-lop { font-size: 1.15em; color: #2b6cb0; font-weight: bold; margin-bottom: 6px; }
        .info-row-gv { font-size: 0.95em; color: #2d3748; margin-bottom: 4px; }
        .info-row-sdt { font-size: 0.95em; color: #718096; margin-bottom: 12px; }
        .info-row-ds { width: 100%; }

        .shift-time { display: inline-block; background: #ebf8ff; color: #2b6cb0; padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 0.95em; }
        
        .btn-shift-copy {
            background-color: #2ecc71; color: white; border: none; padding: 5px 10px;
            font-size: 0.8em; font-weight: bold; border-radius: 5px; cursor: pointer;
        }
        .btn-shift-copy:active { background-color: #27ae60; }

        .no-class { color: #a0aec0; font-style: italic; display: block; padding: 5px 0; }
        
        .student-table { width: 100%; border-collapse: collapse; font-size: 0.95em; margin-top: 5px; }
        .student-table th { background: #f7fafc; color: #718096; text-align: left; padding: 6px 4px; font-size: 0.8em; border-bottom: 1px solid #e2e8f0; text-transform: uppercase; }
        .student-table td { padding: 10px 4px; border-bottom: 1px solid #edf2f7; vertical-align: top; }
        
        .student-row.row-cp { background-color: #e8f5e9 !important; } 
        .student-row.row-kp { background-color: #ffebee !important; } 
        
        .line-1 { font-weight: bold; font-size: 1.05em; color: #2d3748; margin-bottom: 6px; }
        .line-2 { margin-bottom: 8px; display: flex; gap: 8px; }
        .line-3 { display: flex; gap: 6px; }
        
        .parent-phone-box { margin-top: 6px; font-size: 0.85em; color: #4a5568; background: #f7fafc; padding: 4px 6px; border-radius: 4px; border-left: 3px solid #cbd5e0; display: inline-block; width: 100%; }
        .parent-phone-box a { color: #2b6cb0; text-decoration: none; font-weight: bold; }

        .btn-check {
            display: inline-block; width: 40px; height: 35px; line-height: 33px; text-align: center;
            border: 1px solid #cbd5e0; border-radius: 6px; font-weight: bold; cursor: pointer;
            background: #fff; color: #718096; user-select: none; font-size: 1.2em;
        }
        .btn-check.kp-active { background: #e53e3e !important; color: white !important; border-color: #e53e3e !important; }
        .btn-check.cp-active { background: #38a169 !important; color: white !important; border-color: #38a169 !important; }
        
        .btn-act { border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8em; cursor: pointer; font-weight: bold; color: white; }
        .btn-recover { background: #4a5568; } 
        .btn-leave { background: #dd6b20; } 
        
        .input-note { width: 100%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 0.9em; color: #4a5568; min-height: 40px; resize: none; }
        .active-grid { display: grid !important; }
        .active-block { display: block !important; }

        /* Màu cho trợ giảng */
.card-assistant { border-top: 4px solid #e67e22 !important; }
        
    
    </style>
</head>
<body>

    <h2>HỆ THỐNG QUẢN LÝ LỊCH HỌC & ĐIỂM DANH</h2>
    <div class="grid-container" id="main-grid">
        
        <div class="card-A card-teacher">
            <div class="title-A" id="btn-toggle-teacher">👨‍🏫 Danh Sách Giáo Viên <span>▼</span></div>
            <div class="teacher-info-box" id="teacher-box">
                <table class="teacher-table">
                    <thead>
                        <tr>
                            <th>Họ và Tên</th>
                            <th>Ngày Sinh</th>
                            <th>Số Điện Thoại</th>
                        </tr>
                    </thead>
                    <tbody id="teacher-list-data">
                        </tbody>
                </table>
            </div>
        </div>

        <!-- Khối Trợ Giảng -->
<div class="card-A card-assistant">
    <div class="title-A" id="btn-toggle-assistant" style="border-top-color: #e67e22;">👩‍ assistants Trợ Giảng <span>▼</span></div>
    <div class="teacher-info-box" id="assistant-box">
        <table class="teacher-table">
            <thead>
                <tr>
                    <th>Họ và Tên</th>
                    <th>Ngày Sinh</th>
                    <th>Số Điện Thoại</th>
                </tr>
            </thead>
            <tbody id="assistant-list-data">
            </tbody>
        </table>
    </div>
</div>
        

    </div>

    <script>
        // ================= KHO DỮ LIỆU GIÁO VIÊN MỚI THÊM =================
        const DATA_GIAO_VIEN = [
            { name: "Thầy Hùng", dob: "15/08/1992", phone: "0901.234.567" },
            { name: "Cô Linh", dob: "22/11/1995", phone: "0909.888.999" }
        ];

        // ================= KHO DỮ LIỆU TRỢ GIẢNG =================
const DATA_TRO_GIANG = [
    { name: "Bạn Minh", dob: "05/02/2003", phone: "0912.345.678" },
    { name: "Bạn Lan", dob: "12/09/2004", phone: "0987.654.321" }
];


        

        // ================= KHO DỮ LIỆU MẪU HỌC SINH & LỚP =================
        const DATA_HOC_SINH_GOC = {
            "hs1": { name: "Nguyễn Văn Anh", phonePH: "0912.111.222" },
            "hs2": { name: "Trần Thị Bình", phonePH: "0912.333.444" },
            "hs3": { name: "Lê Hoàng Chiến", phonePH: "0912.555.666" }
        };

        const DANH_SACH_LOP_HOC = {
            "Sun": ["hs1", "hs2", "hs3"]
        };

        const dataThoikhoabieu = {
            "2_30_1_1": { tenLop: "Sun", gv: "Thầy Hùng", sdt: "0901.234.567" }
        };

        const configData = [
            { id: 30, floors: 3 },
            { id: 58, floors: 3 },
            { id: 158, floors: 4 },
            { id: 237, floors: 7 }
        ];

        const days = ["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "Chủ Nhật"];
        const mainGrid = document.getElementById('main-grid');

        // Render dữ liệu giáo viên vào bảng công khai
        const tbodyTeacher = document.getElementById('teacher-list-data');
        DATA_GIAO_VIEN.forEach(gv => {
            tbodyTeacher.innerHTML += `
                <tr>
                    <td><strong>${gv.name}</strong></td>
                    <td>${gv.dob}</td>
                    <td><a href="tel:${gv.phone.replace(/\./g, '')}">${gv.phone}</a></td>
                </tr>
            `;
        });

        // Render dữ liệu trợ giảng
const tbodyAssistant = document.getElementById('assistant-list-data');
DATA_TRO_GIANG.forEach(tg => {
    tbodyAssistant.innerHTML += `
        <tr>
            <td><strong>${tg.name}</strong></td>
            <td>${tg.dob}</td>
            <td><a href="tel:${tg.phone.replace(/\./g, '')}">${tg.phone}</a></td>
        </tr>
    `;
});

// Tải hiệu ứng đóng/mở riêng cho ô Trợ Giảng
document.getElementById('btn-toggle-assistant').addEventListener('click', function() {
    const box = document.getElementById('assistant-box');
    box.style.display = (box.style.display === "block") ? "none" : "block";
});

        function checkHasClass(dayNum, houseId, floorNum = null) {
            if (floorNum !== null) {
                for (let c = 1; c <= 3; c++) {
                    if (dataThoikhoabieu[`${dayNum}_${houseId}_${floorNum}_${c}`]) return true;
                }
            } else {
                for (let f = 1; f <= 7; f++) {
                    for (let c = 1; c <= 3; c++) {
                        if (dataThoikhoabieu[`${dayNum}_${houseId}_${f}_${c}`]) return true;
                    }
                }
            }
            return false;
        }

        function generateShiftHTML(dayNum, houseId, floorNum, shiftNum, shiftText) {
            const key = `${dayNum}_${houseId}_${floorNum}_${shiftNum}`;
            const classData = dataThoikhoabieu[key];
            
            if (!classData) {
                return `
                    <div class="shift-block">
                        <div class="info-row-ca"><span class="shift-time">${shiftText}</span></div>
                        <div class="info-row-ds"><span class="no-class">❌ Trống lịch / Chưa xếp lớp</span></div>
                    </div>
                `;
            }

            let studentTableHTML = `
                <table class="student-table">
                    <thead>
                        <tr>
                            <th style="width: 55%;">Học sinh</th>
                            <th style="width: 45%;">Ghi chú & Liên hệ</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            const studentIds = DANH_SACH_LOP_HOC[classData.tenLop] || [];
            studentIds.forEach((hsId, index) => {
                const studentInfo = DATA_HOC_SINH_GOC[hsId];
                if (studentInfo) {
                    const uniqueStorageKey = `${key}_${hsId}`;
                    const phPhone = studentInfo.phonePH || "Chưa cập nhật";
                    const stt = index + 1;

                    studentTableHTML += `
                        <tr class="student-row" data-storagekey="${uniqueStorageKey}" data-stt="${stt}" data-name="${studentInfo.name}">
                            <td>
                                <div class="line-1">${stt}. ${studentInfo.name}</div>
                                <div class="line-2">
                                    <span class="btn-check btn-cp" onclick="toggleAttendance(this, 'cp')">✓</span>
                                    <span class="btn-check btn-kp" onclick="toggleAttendance(this, 'kp')">X</span>
                                </div>
                                <div class="line-3">
                                    <button class="btn-act btn-recover" onclick="handleAction(this, 'recover')">🔄 Học tiếp</button>
                                    <button class="btn-act btn-leave" onclick="handleAction(this, 'leave')">📅 Đã xin nghỉ</button>
                                </div>
                            </td>
                            <td>
                                <textarea class="input-note" placeholder="Lý do nghỉ hoặc ghi chú..." oninput="saveNoteToStorage(this)"></textarea>
                                <div class="parent-phone-box">
                                    📞 PH: <a href="tel:${phPhone.replace(/\./g, '')}">${phPhone}</a>
                                </div>
                            </td>
                        </tr>
                    `;
                }
            });
            studentTableHTML += `</tbody></table>`;

            return `
                <div class="shift-block" id="block-${key}" data-key="${key}" data-shift="${shiftText}" data-lop="${classData.tenLop}" data-gv="${classData.gv}">
                    <div class="info-row-ca">
                        <span class="shift-time">${shiftText}</span>
                        <button class="btn-shift-copy" onclick="copySingleShiftReport('${key}')">📋 Copy báo cáo</button>
                    </div>
                    <div class="info-row-lop">🏫 Lớp: ${classData.tenLop}</div>
                    <div class="info-row-gv">👨‍🏫 <strong>Giáo viên:</strong> ${classData.gv}</div>
                    <div class="info-row-sdt">📞 <strong>Số điện thoại:</strong> ${classData.sdt}</div>
                    <div class="info-row-ds">
                        <div style="font-weight:bold; margin-bottom:6px; color:#2c3e50; font-size:0.95em;">👥 Danh sách học sinh:</div>
                        ${studentTableHTML}
                    </div>
                </div>
            `;
        }

        // Tự động dựng giao diện tuần
        days.forEach((day, index) => {
            const dayIdx = index + 1; 
            const dayNum = index + 2; 
            
            let dayHtml = `
                <div class="card-A">
                    <div class="title-A" data-target="b-grid-${dayIdx}">📅 Ô A${dayIdx}: ${day} <span>▼</span></div>
                    <div class="sub-grid-B" id="b-grid-${dayIdx}">
            `;

            configData.forEach(house => {
                const houseClass = checkHasClass(dayNum, house.id) ? "card-B has-class" : "card-B";
                dayHtml += `<div class="${houseClass}" data-target="t${dayIdx}-b${house.id}">Nhà ${house.id}</div>`;
            });

            configData.forEach(house => {
                dayHtml += `
                    <div class="floor-container-C" id="t${dayIdx}-b${house.id}">
                        <div class="floor-list">
                `;
                for (let f = 1; f <= house.floors; f++) {
                    const floorClass = checkHasClass(dayNum, house.id, f) ? "floor-btn has-class" : "floor-btn";
                    dayHtml += `
                        <div class="floor-item">
                            <button class="${floorClass}" data-target="info-${dayIdx}-${house.id}-${f}">
                                🏢 Tầng ${f} <span>▸</span>
                            </button>
                            <div class="class-info" id="info-${dayIdx}-${house.id}-${f}">
                                ${generateShiftHTML(dayNum, house.id, f, 1, "Ca 18h00")}
                                ${generateShiftHTML(dayNum, house.id, f, 2, "Ca 18h45")}
                                ${generateShiftHTML(dayNum, house.id, f, 3, "Ca 20h00")}
                            </div>
                        </div>
                    `;
                }
                dayHtml += `</div></div>`;
            });

            dayHtml += `</div></div>`;
            mainGrid.innerHTML += dayHtml;
        });

        // ================= LOCALSTORAGE LOGIC =================

        function saveAttendanceState(row, status, noteText) {
            const sKey = row.getAttribute('data-storagekey');
            const dataObj = { status: status, note: noteText };
            localStorage.setItem(sKey, JSON.stringify(dataObj));
        }

        function saveNoteToStorage(textarea) {
            const row = textarea.closest('.student-row');
            let currentStatus = "";
            if (row.classList.contains('row-cp')) currentStatus = "cp";
            if (row.classList.contains('row-kp')) currentStatus = "kp";
            
            saveAttendanceState(row, currentStatus, textarea.value);
        }

        function loadDataFromStorage() {
            document.querySelectorAll('.student-row').forEach(row => {
                const sKey = row.getAttribute('data-storagekey');
                const savedData = localStorage.getItem(sKey);

                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    const cpBtn = row.querySelector('.btn-cp');
                    const kpBtn = row.querySelector('.btn-kp');
                    const noteInput = row.querySelector('.input-note');

                    noteInput.value = parsed.note || "";

                    if (parsed.status === 'cp') {
                        row.className = "student-row row-cp";
                        cpBtn.classList.add('cp-active');
                    } else if (parsed.status === 'kp') {
                        row.className = "student-row row-kp";
                        kpBtn.classList.add('kp-active');
                    }
                }
            });
        }

        // ================= HÀNH VI ĐIỀU CHỈNH ĐIỂM DANH =================

        function toggleAttendance(element, type) {
            const row = element.closest('.student-row');
            const cpBtn = row.querySelector('.btn-cp');
            const kpBtn = row.querySelector('.btn-kp');
            const noteInput = row.querySelector('.input-note');

            let finalStatus = "";

            if (type === 'cp') { 
                kpBtn.classList.remove('kp-active');
                const isActive = element.classList.toggle('cp-active');
                
                if (isActive) {
                    row.className = "student-row row-cp";
                    noteInput.value = "Nghỉ có phép";
                    finalStatus = "cp";
                } else {
                    row.className = "student-row";
                    noteInput.value = "";
                }
            } else if (type === 'kp') { 
                cpBtn.classList.remove('cp-active');
                const isActive = element.classList.toggle('kp-active');
                
                if (isActive) {
                    row.className = "student-row row-kp";
                    noteInput.value = "Vắng không phép";
                    finalStatus = "kp";
                } else {
                    row.className = "student-row";
                    noteInput.value = "";
                }
            }
            saveAttendanceState(row, finalStatus, noteInput.value);
        }

        function handleAction(btn, type) {
            const row = btn.closest('.student-row');
            const cpBtn = row.querySelector('.btn-cp');
            const kpBtn = row.querySelector('.btn-kp');
            const noteInput = row.querySelector('.input-note');

            if (type === 'recover') { 
                row.className = "student-row";
                cpBtn.classList.remove('cp-active');
                kpBtn.classList.remove('kp-active');
                noteInput.value = "";
                saveAttendanceState(row, "", "");
            } else if (type === 'leave') { 
                row.className = "student-row row-cp";
                cpBtn.classList.add('cp-active');
                kpBtn.classList.remove('kp-active');
                noteInput.value = "Đã xin nghỉ dài ngày";
                saveAttendanceState(row, "cp", noteInput.value);
            }
        }

        // ================= CHỨC NĂNG SAO CHÉP CHI TIẾT THEO TỪNG CA HỌC =================
        function copySingleShiftReport(shiftKey) {
            const block = document.getElementById(`block-${shiftKey}`);
            if (!block) return;

            const shiftTime = block.getAttribute('data-shift');
            const tenLop = block.getAttribute('data-lop');
            const gv = block.getAttribute('data-gv');

            const rows = block.querySelectorAll('.student-row');
            const totalStudents = rows.length;
            let absentCount = 0;
            let absentListText = "";

            rows.forEach(row => {
                const sKey = row.getAttribute('data-storagekey');
                const savedData = localStorage.getItem(sKey);
                const stt = row.getAttribute('data-stt');
                const name = row.getAttribute('data-name');

                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    if (parsed.status === 'cp' || parsed.status === 'kp') {
                        absentCount++;
                        const statusLabel = (parsed.status === 'cp') ? "Có phép" : "Không phép";
                        const note = parsed.note ? ` (${parsed.note})` : "";
                        absentListText += `${stt}. ${name} - Vắng: ${statusLabel}${note}\n`;
                    }
                }
            });

            const currentAttendance = totalStudents - absentCount;

            let reportText = `📋 BÁO CÁO CHI TIẾT CA HỌC\n`;
            reportText += `⏰ Ca học: ${shiftTime}\n`;
            reportText += `🏫 Lớp: ${tenLop}\n`;
            reportText += `👨‍🏫 Giáo viên: ${gv}\n`;
            reportText += `👥 Sĩ số: ${currentAttendance}/${totalStudents}\n`;
            reportText += `-----------------------------\n`;
            reportText += `❌ DANH SÁCH HỌC SINH VẮNG:\n`;
            
            if (absentCount === 0) {
                reportText += `🎉 Không có học sinh vắng (Đi học đầy đủ).\n`;
            } else {
                reportText += absentListText;
            }

            const tempTextarea = document.createElement('textarea');
            tempTextarea.value = reportText;
            document.body.appendChild(tempTextarea);
            tempTextarea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextarea);

            alert(`✅ Đã copy báo cáo ca ${shiftTime} (Lớp ${tenLop}) thành công!`);
        }

        loadDataFromStorage();

        // Tải hiệu ứng đóng/mở riêng cho ô Giáo Viên
        document.getElementById('btn-toggle-teacher').addEventListener('click', function() {
            const box = document.getElementById('teacher-box');
            if(box.style.display === "block") {
                box.style.display = "none";
            } else {
                box.style.display = "block";
            }
        });

        // ================= CONTROL ĐIỀU HƯỚNG MENU MOBILE =================
        document.querySelectorAll('.title-A:not(#btn-toggle-teacher)').forEach(title => {
            title.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const targetEl = document.getElementById(targetId);
                if(targetEl) {
                    const isOpen = targetEl.classList.contains('active-grid');
                    document.querySelectorAll('.sub-grid-B').forEach(el => el.classList.remove('active-grid'));
                    if(!isOpen) targetEl.classList.add('active-grid');
                }
            });
        });

        document.querySelectorAll('.card-B').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const targetEl = document.getElementById(targetId);
                const parent = this.parentElement;
                if(targetEl) {
                    const isOpen = targetEl.classList.contains('active-grid');
                    parent.querySelectorAll('.floor-container-C').forEach(el => el.classList.remove('active-grid'));
                    if(!isOpen) targetEl.classList.add('active-grid');
                }
            });
        });

        document.querySelectorAll('.floor-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const targetEl = document.getElementById(targetId);
                const parentList = this.closest('.floor-list');
                if(targetEl) {
                    const isOpen = targetEl.classList.contains('active-block');
                    parentList.querySelectorAll('.class-info').forEach(el => el.classList.remove('active-block'));
                    if(!isOpen) targetEl.classList.add('active-block');
                }
            });
        });
    </script>
</body>
</html>
