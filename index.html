<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Giáo Viên</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            vertical-align: middle;
        }
        th {
            background-color: #3498db;
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        /* Style cho nút gọi điện */
        .btn-call {
            display: inline-block;
            background-color: #2ab7ca;
            color: white;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            transition: background 0.3s ease;
        }
        .btn-call:hover {
            background-color: #1b94a3;
        }
        .badge-lop {
            background-color: #2ecc71;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        @media screen and (max-width: 600px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }
            tr {
                border: 1px solid #ccc;
                margin-bottom: 10px;
                border-radius: 4px;
                padding: 10px;
            }
            td {
                border: none;
                border-bottom: 1px solid #eee;
                position: relative;
                padding-left: 50%;
                text-align: right;
            }
            td:before {
                position: absolute;
                left: 10px;
                width: 45%;
                padding-right: 10px;
                white-space: nowrap;
                text-align: left;
                font-weight: bold;
            }
            td:nth-of-type(1):before { content: "Họ và Tên"; }
            td:nth-of-type(2):before { content: "Liên hệ"; }
            td:nth-of-type(3):before { content: "Tên Lớp"; }
            td:nth-of-type(4):before { content: "Thời Gian Giảng Dạy"; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DANH SÁCH GIÁO VIÊN</h2>
    
    <table>
        <thead>
            <tr>
                <th>Họ và Tên</th>
                <th>Liên hệ</th>
                <th>Tên Lớp</th>
                <th>Thời Gian Giảng Dạy</th>
            </tr>
        </thead>
        <tbody id="teacher-table-body">
            </tbody>
    </table>
</div>

<script>
    // Mảng chứa danh sách giáo viên lớp của bạn
    const danhSachGiaoVien = [
        {
            hoTen: "Nguyễn Văn A",
            sdtRaw: "0901234567",
            sdtDisplay: "0901.234.567",
            lop: "Lớp 10A1",
            thoiGian: "Thứ 2, Thứ 4 (08:00 - 10:00)"
        },
        {
            hoTen: "Trần Thị B",
            sdtRaw: "0912345678",
            sdtDisplay: "0912.345.678",
            lop: "Lớp 11B2",
            thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)"
        },
        {
            hoTen: "Lê Hoàng C",
            sdtRaw: "0983456789",
            sdtDisplay: "0983.456.789",
            lop: "Lớp 12C3",
            thoiGian: "Thứ 7 (09:00 - 11:30)"
        },
        {
            hoTen: "Phạm Minh D",
            sdtRaw: "0977888999",
            sdtDisplay: "0977.888.999",
            lop: "Lớp Luyện Thi",
            thoiGian: "Chủ Nhật (18:00 - 20:00)"
        }
    ];

    // Hàm render mảng dữ liệu ra bảng HTML
    function renderTable() {
        const tbody = document.getElementById("teacher-table-body");
        tbody.innerHTML = ""; // Xóa dữ liệu cũ nếu có

        danhSachGiaoVien.forEach(gv => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td><strong>${gv.hoTen}</strong></td>
                <td><a href="tel:${gv.sdtRaw}" class="btn-call">📞 Gọi: ${gv.sdtDisplay}</a></td>
                <td><span class="badge-lop">${gv.lop}</span></td>
                <td>${gv.thoiGian}</td>
            `;

            tbody.appendChild(tr);
        });
    }

    // Chạy hàm render khi trang web tải xong
    window.onload = renderTable;
</script>

</body>
</html>
