<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Lý Nhân Sự Giảng Dạy</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Tắt viền xanh khi chạm trên điện thoại */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121216; /* Nền tối sâu */
            color: #e2e8f0;
            margin: 0;
            padding: 8px; /* Giảm padding viền ngoài */
        }
        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #1e1e24;
            padding: 12px; /* Thu nhỏ padding container */
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h2 {
            text-align: center;
            color: #ffffff;
            margin: 4px 0 14px 0;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 📱 THANH TIÊU ĐỀ ACCORDION BẤM ĐỂ ĐÓNG/MỞ */
        .accordion-header {
            background-color: #262631;
            color: #3498db;
            padding: 10px 12px; /* Thu nhỏ thanh tiêu đề */
            margin-top: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            border-left: 4px solid #3498db;
            transition: background-color 0.2s;
        }
        .header-chinh { color: #1abc9c; border-left-color: #1abc9c; }
        .header-phan-nhom { color: #9b59b6; border-left-color: #9b59b6; }
        .header-tro-giang { color: #e67e22; border-left-color: #e67e22; }
        
        .accordion-icon {
            transition: transform 0.2s ease;
            font-size: 0.8em;
        }
        .accordion-header.active .accordion-icon {
            transform: rotate(180deg);
        }
        .accordion-header:active {
            background-color: #2d2d3a;
        }

        /* KHỐI NỘI DUNG ẨN MẶC ĐỊNH */
        .accordion-content {
            display: none;
            margin-top: 6px;
            margin-bottom: 8px;
        }
        .accordion-content.open {
            display: block;
        }

        /* 📱 DANH SÁCH DẠNG THẺ TỐI ƯU KHÔNG GIAN DÒNG */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 8px; /* Giảm khoảng cách giữa các thẻ */
        }
        .user-card {
            background: #262631;
            border-radius: 10px;
            padding: 10px; /* Thu nhỏ tối đa padding của thẻ */
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-left: 3px solid #555566;
        }
        .header-chinh + .accordion-content .user-card { border-left-color: #1abc9c; }
        .header-phan-nhom + .accordion-content .user-card { border-left-color: #9b59b6; }
        .header-tro-giang + .accordion-content .user-card { border-left-color: #e67e22; }

        /* TÊN GIÁO VIÊN */
        .card-top-info {
            margin-bottom: 8px;
            border-bottom: 1px solid #3f3f52;
            padding-bottom: 4px;
        }
        .user-name {
            font-size: 1em;
            font-weight: bold;
            color: #ffffff;
        }

        /* KHỐI LỚP HỌC */
        .class-section {
            margin-bottom: 6px;
        }
        .class-section-title {
            font-size: 0.8em;
            color: #1abc9c;
            font-weight: bold;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-phan-nhom + .accordion-content .class-section-title { color: #9b59b6; }
        .header-tro-giang + .accordion-content .class-section-title { color: #e67e22; }

        /* 🗓️ KHU VỰC HIỂN THỊ LỊCH HỌC TỐI ƯU KHÔNG XUỐNG DÒNG */
        .session-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .session-row {
            background: #1e1e24;
            padding: 5px 8px; /* Thu hẹp tối đa đệm ô lịch */
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.78em; /* Hạ nhẹ cỡ chữ để đảm bảo ôm trọn lịch dài trên cùng 1 dòng */
        }
        .session-title {
            font-weight: bold;
            color: #94a3b8;
            min-width: 42px; /* Ép không gian tiêu đề nhỏ lại */
            white-space: nowrap;
        }
        .session-info {
            flex: 1;
            text-align: right;
            color: #e2e8f0;
            white-space: nowrap; /* Cấm chữ tự động xuống dòng */
            overflow: hidden;
            text-overflow: ellipsis; /* Nếu quá dài sẽ hiển thị dấu ... thay vì phá hỏng layout */
            padding-left: 6px;
        }

        /* KHU VỰC NÚT LIÊN HỆ */
        .contact-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }
        .btn-action {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: white;
            padding: 8px 0; /* Thu nhỏ nút liên hệ */
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8em;
            text-align: center;
            transition: opacity 0.2s;
        }
        .btn-phone { background-color: #1ba3b5; }
        .btn-zalo { background-color: #0068ff; }
        .btn-action:active { opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <h2>Quản Lý Nhân Sự</h2>
    
    <!-- 1. GIÁO VIÊN CHÍNH -->
    <div class="accordion-header header-chinh" onclick="toggleAccordion('gv-chinh-content', this)">
        <span>⭐ GIÁO VIÊN CHÍNH</span>
        <span class="accordion-icon">▼</span>
    </div>
    <div id="gv-chinh-content" class="accordion-content">
        <div id="gv-chinh-cards" class="card-list"></div>
    </div>

    <!-- 2. PHÂN NHÓM -->
    <div class="accordion-header header-phan-nhom" onclick="toggleAccordion('gv-phan-nhom-content', this)">
        <span>👥 GIÁO VIÊN PHÂN NHÓM</span>
        <span class="accordion-icon">▼</span>
    </div>
    <div id="gv-phan-nhom-content" class="accordion-content">
        <div id="gv-phan-nhom-cards" class="card-list"></div>
    </div>

    <!-- 3. TRỢ GIẢNG -->
    <div class="accordion-header header-tro-giang" onclick="toggleAccordion('tro-giang-content', this)">
        <span>🧑‍🎓 DANH SÁCH TRỢ GIẢNG</span>
        <span class="accordion-icon">▼</span>
    </div>
    <div id="tro-giang-content" class="accordion-content">
        <div id="tro-giang-cards" class="card-list"></div>
    </div>
</div>

<script>
    const danhSachGvChinh = [
        { 
            hoTen: "Anh Thư", sdt: "0901234567",
            lopA: { tenLop: "📖 Lớp 10A1", b1: "T2 (08:00-10:00) - Ca 1", b2: "T4 (08:00-10:00) - Ca 1" },
            lopB: { tenLop: "📖 Lớp 11B3", b3: "T3 (14:00-16:00) - Ca 3", b4: "T5 (14:00-16:00) - Ca 3" }
        },
        { 
            hoTen: "Phương Thanh", sdt: "0912345678",
            lopA: { tenLop: "📖 Lớp VIP 1", b1: "Thứ 2 (18:00 - 20:00)", b2: "Thứ 6 (18:00 - 20:00)" },
            lopB: { tenLop: "📖 Lớp VIP 2", b3: "Thứ 7 (09:00 - 11:00)", b4: "CN (09:00 - 11:00)" }
        }
    ];

    const danhSachGvPhanNhom = [
        { 
            hoTen: "Hà Linh", sdt: "0912345680",
            lopA: { tenLop: "👥 Nhóm Toán 1", b1: "Thứ 3 (14:00 - 16:00)", b2: "Thứ 5 (14:00 - 16:00)" },
            lopB: { tenLop: "👥 Nhóm Toán 2", b3: "Thứ 3 (16:30 - 18:30)", b4: "Thứ 5 (16:30 - 18:30)" }
        }
    ];

    const danhSachTroGiang = [
        { 
            hoTen: "Phạm Minh D", sdt: "0977888999",
            lopA: { tenLop: "✏️ Hỗ trợ lớp 10", b1: "Thứ 2 (Ca sáng)", b2: "Thứ 4 (Ca sáng)" },
            lopB: { tenLop: "✏️ Hỗ trợ lớp 11", b3: "Thứ 3 (Ca chiều)", b4: "Thứ 5 (Ca chiều)" }
        }
    ];

    function getRawPhone(phoneStr) {
        return phoneStr.replace(/[^0-9]/g, "");
    }

    function formatPhoneDisplay(phoneStr) {
        if (!phoneStr) return "";
        return phoneStr.replace(/(\d{4})(\d{3})(\d{3})/, "$1.$2.$3");
    }

    function renderCardList(dataArray, targetContainerId) {
        const container = document.getElementById(targetContainerId);
        container.innerHTML = ""; 

        dataArray.forEach(item => {
            const rawPhone = getRawPhone(item.sdt);
            const displayPhone = formatPhoneDisplay(item.sdt);
            
            const card = document.createElement("div");
            card.className = "user-card";
            card.innerHTML = `
                <div class="card-top-info">
                    <div class="user-name">${item.hoTen}</div>
                </div>
                
                <div class="class-section">
                    <div class="class-section-title">${item.lopA.tenLop}</div>
                    <div class="session-container">
                        <div class="session-row">
                            <span class="session-title">B1:</span>
                            <div class="session-info">${item.lopA.b1}</div>
                        </div>
                        <div class="session-row">
                            <span class="session-title">B2:</span>
                            <div class="session-info">${item.lopA.b2}</div>
                        </div>
                    </div>
                </div>

                <div class="class-section">
                    <div class="class-section-title">${item.lopB.tenLop}</div>
                    <div class="session-container">
                        <div class="session-row">
                            <span class="session-title">B3:</span>
                            <div class="session-info">${item.lopB.b3}</div>
                        </div>
                        <div class="session-row">
                            <span class="session-title">B4:</span>
                            <div class="session-info">${item.lopB.b4}</div>
                        </div>
                    </div>
                </div>

                <div class="contact-actions">
                    <a href="tel:${rawPhone}" class="btn-action btn-phone">📞 Gọi: ${displayPhone}</a>
                    <a href="https://zalo.me/${rawPhone}" target="_blank" class="btn-action btn-zalo">💬 Zalo</a>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function toggleAccordion(contentId, headerElement) {
        const content = document.getElementById(contentId);
        const isOpen = content.classList.contains('open');
        
        if (isOpen) {
            content.classList.remove('open');
            headerElement.classList.remove('active');
        } else {
            content.classList.add('open');
            headerElement.classList.add('active');
        }
    }

    window.onload = function() {
        renderCardList(danhSachGvChinh, "gv-chinh-cards");
        renderCardList(danhSachGvPhanNhom, "gv-phan-nhom-cards");
        renderCardList(danhSachTroGiang, "tro-giang-cards");
    };
</script>

</body>
</html>
